spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
application.title=online-banking-rest-api
application.version=1.0.0
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

onlinebankingrestapi.jwt.security.app.key=ONLINEBANKINGRESTAPI
onlinebankingrestapi.jwt.security.expire.time=86400000

cbarkinozer.kafka.adddress=localhost:9092
cbarkinozer.kafka.topic=logs
cbarkinozer.kafka.group-id=onlinebankingrestapi
